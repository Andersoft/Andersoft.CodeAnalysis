name: Publish NuGet Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        project:
          - path: src/Andersoft.CodeAnalysis
            name: Andersoft.CodeAnalysis
          - path: src/Andersoft.CodeAnalysis.EntityFramework
            name: Andersoft.CodeAnalysis.EntityFramework

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: Compute version
        run: |
          VERSION="1.0.${{ github.run_number }}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Computed version: $VERSION"

      - name: Restore
        run: dotnet restore ${{ matrix.project.path }}

      - name: Build
        run: dotnet build ${{ matrix.project.path }} --configuration Release --no-restore

      - name: Pack
        run: dotnet pack ${{ matrix.project.path }} --configuration Release --no-build --output ./nupkgs -p:Version=${{ env.VERSION }}

      - name: Publish to GitHub Packages
        run: >
          dotnet nuget push ./nupkgs/${{ matrix.project.name }}.*.nupkg
          --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
          --api-key ${{ secrets.GITHUB_TOKEN }}
          --skip-duplicate

      - name: Publish to NuGet.org
        run: >
          dotnet nuget push ./nupkgs/${{ matrix.project.name }}.*.nupkg
          --source https://api.nuget.org/v3/index.json
          --api-key ${{ secrets.NUGET_API_KEY }}
          --skip-duplicate
